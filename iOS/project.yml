name: CarShowEntryLog
options:
  bundleIdPrefix: com.shimondeitel.showentrylog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CarShowEntryLog:
    type: application
    platform: iOS
    sources:
      - path: CarShowEntryLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.showentrylog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CarShowEntryLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CarShowEntryLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CarShowEntryLogTests
      - path: CarShowEntryLog.storekit
    dependencies:
      - target: CarShowEntryLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.showentrylog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CarShowEntryLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CarShowEntryLogUITests
    dependencies:
      - target: CarShowEntryLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.showentrylog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CarShowEntryLog:
    build:
      targets:
        CarShowEntryLog: all
        CarShowEntryLogTests: [test]
        CarShowEntryLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CarShowEntryLog.storekit
    test:
      config: Debug
      storeKitConfiguration: CarShowEntryLog.storekit
      targets:
        - CarShowEntryLogTests
        - CarShowEntryLogUITests
    archive:
      config: Release
